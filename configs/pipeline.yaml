aoi:
  path: data/aoi/processed/western_cape.parquet
  tile_km: 10
  # tile/block grids build in SA Albers equal-area (see cmrv.aoi.SA_ALBERS) — national,
  # true-square tiles country-wide; not UTM 34S (skews outside its zone).

# Three phenology-tuned months for the WESTERN CAPE (winter-rainfall
# Mediterranean — NOT the summer-rainfall calendar of most SA literature):
#   • feb — peak dry-summer trough: evergreen Pinus/Eucalyptus/Hakea stand out
#           against the senesced fynbos/herbaceous matrix.
#   • may — autumn transition (non-flowering baseline; green-down).
#   • sep — spring green-up + Acacia flowering (yellow bloom = wattle-specific).
# Red-edge bands (B05–B07, B8A) carry most of the discriminatory signal.
#
# YYYY semantics differ by consumer:
#   • `cmrv ingest-month` uses these dates literally (2023 stack).
#   • `cmrv ingest-chips` substitutes each label's event_date year, so the 3
#     windows come from the SAME year as the label (single-year phenology).
# The temporal head masks any month that has no cloud-free composite.
months: &winter_months
  - {start: "2023-02-01", end: "2023-02-28", label: feb}
  - {start: "2023-05-01", end: "2023-05-31", label: may}
  - {start: "2023-09-01", end: "2023-09-30", label: sep}

# Region-aware months for chip extraction (ingest-chips). Each label picks its set
# from its province (aoi_admin1 → zone). infer / ingest-month keep using `months`.
#   • winter_rainfall (WC): feb dry-summer trough / may autumn / sep spring+Acacia bloom.
#   • summer_rainfall (KZN/EC/Limpopo/Mpumalanga): jul / sep / dec, from Masemola et al.
#     2020 "Sentinel-2 time series … optimal features and time window for mapping invasive
#     Acacia … KwaZulu-Natal" (Int. J. Appl. Earth Obs. Geoinf. 93, 102207). Best Acacia
#     accuracy came from dry + flowering + growing-season imagery; jul/sep/dec each >80%:
#       jul — dry-winter senescence: native grassland/savanna dormant & brown, evergreen
#             Pine/Wattle/Gum (and structural canopy) stand out most.
#       sep — Acacia (mearnsii/dealbata) flowering + early green-up — wattle-specific signal.
#       dec — early-to-peak summer growth (Nov–mid-Mar): full-canopy red-edge separability.
#     Red-edge bands/indices dominate discrimination (B05–B07, B8A), as in the WC set.
months_by_zone:
  winter_rainfall: *winter_months
  summer_rainfall:
    - {start: "2023-07-01", end: "2023-07-31", label: jul}
    - {start: "2023-09-01", end: "2023-09-30", label: sep}
    - {start: "2023-12-01", end: "2023-12-31", label: dec}

# Province (aoi_admin1) → rainfall-seasonality zone. Unlisted → winter_rainfall (WC default).
admin1_zone:
  western_cape: winter_rainfall
  kwazulu_natal: summer_rainfall
  eastern_cape: summer_rainfall
  limpopo: summer_rainfall
  mpumalanga: summer_rainfall

s2_bands: [B02, B03, B04, B05, B06, B07, B08, B8A, B11, B12]
# Scene-level cloud cover cap. SCL masking handles per-pixel cloud removal,
# so this is set permissively (95) — letting more candidate scenes into the
# monthly median, after which SCL strips the bad pixels per-scene.
cloud_cover_max: 95
