# Label schema for Phase 0 (Lens A — Invasive Alien Plants).
#
# Class IDs are stable integers. ``class_id`` is NEVER assigned at ingest —
# training subsets crosswalk (species_normalized → class_id) via
# class_maps.<name>.<id>.members[] below, applied at `cmrv make-split` time.
#
# Two framings coexist: the IAP-only maps (western_cape_iap, *_genus) where
# "not-IAP" is left to downstream OOD novelty flagging, and the unified
# western_cape_landcover map where native biomes (VegMap T_BIOME) + transformed
# classes (SANLC accuracy points) are explicit — every pixel classified.
#
# Single source of truth: each class lists its ``members`` — canonical scientific
# binomials for IAP classes, or the adapter-emitted biome / land-cover string for
# native + transformed classes. ``genus_fallback: true`` collapses any species in
# ``genus`` into that class.
# ----------------------------------------------------------------------------

nodata: 255

# ----------------------------------------------------------------------------
# class_maps — one entry per training config; keyed by config name.
# ----------------------------------------------------------------------------
class_maps:

  # 8-class IAP schema for the Western Cape Phase 0 run.
  # A. cyclops merged into A. saligna (class 1); three riparian IAPs collapsed
  # into class 7 (data-poor individually; share riparian habitat).
  western_cape_iap:
    0:
      name: acacia_mearnsii
      members: ["Acacia mearnsii", "Racosperma mearnsii"]
    1:
      name: acacia_saligna           # absorbs A. cyclops
      members:
        - "Acacia saligna"
        - "Acacia cyanophylla"       # old synonym of saligna
        - "Acacia cyclops"           # merged into class 1
    2:
      name: acacia_melanoxylon
      members: ["Acacia melanoxylon"]
    3:
      name: acacia_longifolia
      members: ["Acacia longifolia"]
    4:
      name: pinus_spp                # pinaster + radiata + halepensis merged
      members:
        - "Pinus pinaster"
        - "Pinus radiata"
        - "Pinus halepensis"
      genus_fallback: true
      genus: pinus
    5:
      name: eucalyptus_spp
      members:
        - "Eucalyptus camaldulensis"
        - "Eucalyptus globulus"
        - "Eucalyptus cladocalyx"
        - "Eucalyptus lehmannii"
      genus_fallback: true
      genus: eucalyptus
    6:
      name: hakea_sericea
      members: ["Hakea sericea"]
    7:
      name: iap_riparian             # Leptospermum + Populus + Sesbania
      members:
        - "Leptospermum laevigatum"
        - "Populus × canescens"
        - "Populus x canescens"
        - "Populus alba"
        - "Populus canescens"
        - "Sesbania punicea"
    8:
      name: prosopis_spp             # mesquite — genus-level (MapWAPS Alien_Prosopis)
      members:
        - "Prosopis glandulosa"
        - "Prosopis velutina"
        - "Prosopis juliflora"
        - "Prosopis chilensis"
      genus_fallback: true
      genus: prosopis

  # --------------------------------------------------------------------------
  # Genus-level collapse for Phase 0. MapWAPS labels are genus/functional only
  # (Alien_Pine/Gum/Wattle/Prosopis), so the species-level Acacia split can't be
  # honoured across sources. Acacia → acacia_spp. Flip to western_cape_iap +
  # hierarchical loss once enough species-level data lands.
  western_cape_iap_genus:
    0:
      name: acacia_spp
      members:
        - "Acacia mearnsii"
        - "Acacia saligna"
        - "Acacia cyanophylla"
        - "Acacia cyclops"
        - "Acacia melanoxylon"
        - "Acacia longifolia"
      genus_fallback: true
      genus: acacia
    1:
      name: pinus_spp
      members:
        - "Pinus pinaster"
        - "Pinus radiata"
        - "Pinus halepensis"
      genus_fallback: true
      genus: pinus
    2:
      name: eucalyptus_spp
      members:
        - "Eucalyptus camaldulensis"
        - "Eucalyptus globulus"
      genus_fallback: true
      genus: eucalyptus
    3:
      name: hakea_spp
      members:
        - "Hakea sericea"
      genus_fallback: true
      genus: hakea
    4:
      name: prosopis_spp
      members:
        - "Prosopis glandulosa"
        - "Prosopis velutina"
      genus_fallback: true
      genus: prosopis
    5:
      name: iap_riparian
      members:
        - "Leptospermum laevigatum"
        - "Populus × canescens"
        - "Populus x canescens"
        - "Populus alba"
        - "Populus canescens"
        - "Sesbania punicea"

  # --------------------------------------------------------------------------
  # Unified land-cover map: IAP genera (field) + native biomes (VegMap T_BIOME)
  # + transformed/other (collapsed SANLC accuracy-point classes). Every pixel
  # classified → seamless map. Biome + transformed labels come from
  # `cmrv labels-sanlc-ingest`; their members are the strings that adapter emits.
  western_cape_landcover:
    # --- IAP genera (field adapters) ---
    0:
      name: acacia_spp
      members: ["Acacia mearnsii", "Acacia saligna", "Acacia cyanophylla",
                "Acacia cyclops", "Acacia melanoxylon", "Acacia longifolia"]
      genus_fallback: true
      genus: acacia
    1:
      name: pinus_spp
      members: ["Pinus pinaster", "Pinus radiata", "Pinus halepensis"]
      genus_fallback: true
      genus: pinus
    2:
      name: eucalyptus_spp
      members: ["Eucalyptus camaldulensis", "Eucalyptus globulus"]
      genus_fallback: true
      genus: eucalyptus
    3:
      name: hakea_spp
      members: ["Hakea sericea"]
      genus_fallback: true
      genus: hakea
    4:
      name: prosopis_spp
      members: ["Prosopis glandulosa", "Prosopis velutina"]
      genus_fallback: true
      genus: prosopis
    5:
      name: iap_riparian            # Populus split out to its own class (21) once data-rich
      members: ["Leptospermum laevigatum", "Sesbania punicea"]
    # --- native biomes (VegMap T_BIOME) ---
    6:  {name: fynbos,          members: ["fynbos"]}
    7:  {name: succulent_karoo, members: ["succulent_karoo"]}
    8:  {name: nama_karoo,      members: ["nama_karoo"]}
    9:  {name: albany_thicket,  members: ["albany_thicket"]}
    10: {name: forest,          members: ["forest"]}
    11: {name: azonal,          members: ["azonal"]}
    12: {name: grassland,       members: ["grassland"]}
    # --- transformed / other (collapsed SANLC accuracy-point classes) ---
    13: {name: built_up,        members: ["built_up"]}
    14: {name: cultivated,      members: ["cultivated"]}
    15: {name: planted_forest,  members: ["planted_forest"]}
    16: {name: bare,            members: ["bare"]}
    17: {name: water,           members: ["water"]}
    18: {name: wetland,         members: ["wetland"]}
    # --- added for multi-catchment SA coverage (WC Renosterveld; KZN/EC summer-rainfall) ---
    19: {name: renosterveld,    members: ["renosterveld"]}   # own class (was folded into fynbos)
    20: {name: savanna,         members: ["savanna"]}        # native woody: MapWAPS Indigenous Bush_*
    21:
      name: populus_spp                                      # Alien_Poplar (Populus × canescens)
      members: ["Populus canescens", "Populus alba"]
      genus_fallback: true
      genus: populus
