# Label schema for Phase 0 (Lens A — Invasive Alien Plants).
#
# Class IDs are stable integers. ``class_id`` is NEVER assigned at ingest —
# training subsets crosswalk (species_normalized → class_id) via
# class_maps.<name>.<id>.members[] below, applied at `cmrv make-split` time.
#
# Phase 0 is IAP-species-only: native / background classes (fynbos, indigenous
# forest, other land cover) are DEFERRED — "not-IAP" is handled downstream by
# OOD novelty flagging, not an explicit class. Re-add native sources + classes
# when NLC / Vegmap are reinstated.
#
# Single source of truth: each class lists its ``members`` (canonical scientific
# binomials, plus hybrid spellings/synonyms GBIF backbone resolution may return).
# ``genus_fallback: true`` collapses any species in ``genus`` into that class —
# used for pinus_spp + eucalyptus_spp.
# ----------------------------------------------------------------------------

nodata: 255

# ----------------------------------------------------------------------------
# class_maps — one entry per training config; keyed by config name.
# ----------------------------------------------------------------------------
class_maps:

  # 8-class IAP schema for the Western Cape Phase 0 run.
  # A. cyclops merged into A. saligna (class 1); three riparian IAPs collapsed
  # into class 7 (data-poor individually; share riparian habitat).
  western_cape_iap:
    0:
      name: acacia_mearnsii
      group: iap_wattle
      weight_base: 1.0
      members: ["Acacia mearnsii", "Racosperma mearnsii"]
    1:
      name: acacia_saligna           # absorbs A. cyclops
      group: iap_wattle
      weight_base: 1.0
      members:
        - "Acacia saligna"
        - "Acacia cyanophylla"       # old synonym of saligna
        - "Acacia cyclops"           # merged into class 1
    2:
      name: acacia_melanoxylon
      group: iap_wattle
      weight_base: 1.0
      members: ["Acacia melanoxylon"]
    3:
      name: acacia_longifolia
      group: iap_wattle
      weight_base: 1.0
      members: ["Acacia longifolia"]
    4:
      name: pinus_spp                # pinaster + radiata + halepensis merged
      group: iap_pine
      weight_base: 1.0
      members:
        - "Pinus pinaster"
        - "Pinus radiata"
        - "Pinus halepensis"
      genus_fallback: true
      genus: pinus
    5:
      name: eucalyptus_spp
      group: iap_euc
      weight_base: 1.0
      members:
        - "Eucalyptus camaldulensis"
        - "Eucalyptus globulus"
        - "Eucalyptus cladocalyx"
        - "Eucalyptus lehmannii"
      genus_fallback: true
      genus: eucalyptus
    6:
      name: hakea_sericea
      group: iap_proteoid
      weight_base: 1.0
      members: ["Hakea sericea"]
    7:
      name: iap_riparian             # Leptospermum + Populus + Sesbania
      group: iap_riparian
      weight_base: 0.9
      members:
        - "Leptospermum laevigatum"
        - "Populus × canescens"
        - "Populus x canescens"
        - "Populus alba"
        - "Populus canescens"
        - "Sesbania punicea"
    8:
      name: prosopis_spp             # mesquite — genus-level (MapWAPS Alien_Prosopis)
      group: iap_prosopis
      weight_base: 1.0
      members:
        - "Prosopis glandulosa"
        - "Prosopis velutina"
        - "Prosopis juliflora"
        - "Prosopis chilensis"
      genus_fallback: true
      genus: prosopis

  # --------------------------------------------------------------------------
  # Genus-level collapse for Phase 0. MapWAPS labels are genus/functional only
  # (Alien_Pine/Gum/Wattle/Prosopis), so the species-level Acacia split can't be
  # honoured across sources. Acacia → acacia_spp. Flip to western_cape_iap +
  # hierarchical loss once enough species-level data lands.
  western_cape_iap_genus:
    0:
      name: acacia_spp
      group: iap_wattle
      weight_base: 1.0
      members:
        - "Acacia mearnsii"
        - "Acacia saligna"
        - "Acacia cyanophylla"
        - "Acacia cyclops"
        - "Acacia melanoxylon"
        - "Acacia longifolia"
      genus_fallback: true
      genus: acacia
    1:
      name: pinus_spp
      group: iap_pine
      weight_base: 1.0
      members:
        - "Pinus pinaster"
        - "Pinus radiata"
        - "Pinus halepensis"
      genus_fallback: true
      genus: pinus
    2:
      name: eucalyptus_spp
      group: iap_euc
      weight_base: 1.0
      members:
        - "Eucalyptus camaldulensis"
        - "Eucalyptus globulus"
      genus_fallback: true
      genus: eucalyptus
    3:
      name: hakea_spp
      group: iap_proteoid
      weight_base: 1.0
      members:
        - "Hakea sericea"
      genus_fallback: true
      genus: hakea
    4:
      name: prosopis_spp
      group: iap_prosopis
      weight_base: 1.0
      members:
        - "Prosopis glandulosa"
        - "Prosopis velutina"
      genus_fallback: true
      genus: prosopis
    5:
      name: iap_riparian
      group: iap_riparian
      weight_base: 0.9
      members:
        - "Leptospermum laevigatum"
        - "Populus × canescens"
        - "Populus x canescens"
        - "Populus alba"
        - "Populus canescens"
        - "Sesbania punicea"

  # --------------------------------------------------------------------------
  # Unified land-cover map: IAP genera (field) + native biomes (VegMap T_BIOME)
  # + transformed/other (collapsed SANLC accuracy-point classes). Every pixel
  # classified → seamless map. Biome + transformed labels come from
  # `cmrv labels-sanlc-ingest`; their members are the strings that adapter emits.
  western_cape_landcover:
    # --- IAP genera (field adapters) ---
    0:
      name: acacia_spp
      group: iap
      members: ["Acacia mearnsii", "Acacia saligna", "Acacia cyanophylla",
                "Acacia cyclops", "Acacia melanoxylon", "Acacia longifolia"]
      genus_fallback: true
      genus: acacia
    1:
      name: pinus_spp
      group: iap
      members: ["Pinus pinaster", "Pinus radiata", "Pinus halepensis"]
      genus_fallback: true
      genus: pinus
    2:
      name: eucalyptus_spp
      group: iap
      members: ["Eucalyptus camaldulensis", "Eucalyptus globulus"]
      genus_fallback: true
      genus: eucalyptus
    3:
      name: hakea_spp
      group: iap
      members: ["Hakea sericea"]
      genus_fallback: true
      genus: hakea
    4:
      name: prosopis_spp
      group: iap
      members: ["Prosopis glandulosa", "Prosopis velutina"]
      genus_fallback: true
      genus: prosopis
    5:
      name: iap_riparian
      group: iap
      members: ["Leptospermum laevigatum", "Populus canescens", "Populus alba", "Sesbania punicea"]
    # --- native biomes (VegMap T_BIOME) ---
    6:  {name: fynbos,          group: native_biome, members: ["fynbos"]}
    7:  {name: succulent_karoo, group: native_biome, members: ["succulent_karoo"]}
    8:  {name: nama_karoo,      group: native_biome, members: ["nama_karoo"]}
    9:  {name: albany_thicket,  group: native_biome, members: ["albany_thicket"]}
    10: {name: forest,          group: native_biome, members: ["forest"]}
    11: {name: azonal,          group: native_biome, members: ["azonal"]}
    12: {name: grassland,       group: native_biome, members: ["grassland"]}
    # --- transformed / other (collapsed SANLC accuracy-point classes) ---
    13: {name: built_up,        group: transformed, members: ["built_up"]}
    14: {name: cultivated,      group: transformed, members: ["cultivated"]}
    15: {name: planted_forest,  group: transformed, members: ["planted_forest"]}
    16: {name: bare,            group: transformed, members: ["bare"]}
    17: {name: water,           group: transformed, members: ["water"]}
    18: {name: wetland,         group: transformed, members: ["wetland"]}

# ----------------------------------------------------------------------------
# BioSCape VegPlots (Berg + Eerste, 2022–2023) — field plots.
# HIGH-QUALITY GROUND TRUTH. GPS + date + species cover %.
# IAP membership decided from class_maps.<name>.members[].
# ----------------------------------------------------------------------------
bioscape_vegplots:
  site_csv: data/labels/raw/BioSCape_VegPlots_Berg_Eerste_2425/data/Berg_Eerste_Veg_SiteData.csv
  plot_cover_csv: data/labels/raw/BioSCape_VegPlots_Berg_Eerste_2425/data/Berg_Eerste_Veg_PlotCoverage.csv
  line_intercept_csv: data/labels/raw/BioSCape_VegPlots_Berg_Eerste_2425/data/Berg_Eerste_Veg_LineIntercept.csv
  dominant_cover_min: 40        # species with cover ≥40% promoted to plot label
  weight: 0.95                  # highest — field-expert identified
